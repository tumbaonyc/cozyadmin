<svg width="100%" viewBox="0 0 680 920" xmlns="http://www.w3.org/2000/svg" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: white;">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Step 1: Trigger -->
<g>
  <rect x="210" y="30" width="260" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="50" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">New channel message</text>
  <text x="340" y="68" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">Trigger (root posts only)</text>
</g>

<!-- Arrow 1→2 -->
<line x1="340" y1="86" x2="340" y2="110" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Step 2: Get a team -->
<g>
  <rect x="210" y="110" width="260" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="340" y="132" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#444441">Get a team</text>
</g>

<!-- Arrow 2→3 -->
<line x1="340" y1="154" x2="340" y2="178" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Step 3: Compose deep link -->
<g>
  <rect x="210" y="178" width="260" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="340" y="198" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">Compose</text>
  <text x="340" y="216" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">Build deep link to post</text>
</g>

<!-- Arrow 3→4 -->
<line x1="340" y1="234" x2="340" y2="258" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Step 4: List group members -->
<g>
  <rect x="210" y="258" width="260" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="340" y="278" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#0C447C">List group members</text>
  <text x="340" y="296" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#185FA5">O365 Groups connector</text>
</g>

<!-- Arrow 4→5 -->
<line x1="340" y1="314" x2="340" y2="338" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Step 5: Initialize variable -->
<g>
  <rect x="210" y="338" width="260" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="340" y="360" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#444441">Initialize FailedUsers</text>
</g>

<!-- Arrow 5→6 -->
<line x1="340" y1="382" x2="340" y2="406" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Apply to each container -->
<rect x="100" y="406" width="480" height="340" rx="20" fill="none" stroke="#888780" stroke-width="0.5" stroke-dasharray="6 4"/>
<text x="120" y="426" font-size="12" fill="#5F5E5A">Apply to each (concurrency: 15-20)</text>

<!-- Step 6a: Get user profile -->
<g>
  <rect x="180" y="440" width="320" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="340" y="462" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#444441">Get user profile (V2)</text>
</g>

<!-- Arrow 6a→6b -->
<line x1="340" y1="484" x2="340" y2="508" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Step 6b: Delay -->
<g>
  <rect x="240" y="508" width="200" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="340" y="530" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#444441">Delay (1 second)</text>
</g>

<!-- Arrow 6b→6c -->
<line x1="340" y1="552" x2="340" y2="576" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Step 6c: Post adaptive card -->
<g>
  <rect x="180" y="576" width="320" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="340" y="596" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#712B13">Post adaptive card</text>
  <text x="340" y="614" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#993C1D">Via Copilot Studio bot</text>
</g>

<!-- Arrow 6c→6d (failure path) -->
<path d="M500 604 L540 604 L540 680 L500 680" fill="none" stroke="#993C1D" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="548" y="644" dominant-baseline="central" font-size="12" fill="#993C1D">On failure</text>

<!-- Step 6d: Append to string -->
<g>
  <rect x="180" y="660" width="320" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="340" y="680" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#633806">Append to FailedUsers</text>
  <text x="340" y="698" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#854F0B">Log failed UPN</text>
</g>

<!-- Arrow loop→condition -->
<line x1="340" y1="746" x2="340" y2="784" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Step 7: Condition -->
<g>
  <rect x="170" y="784" width="340" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="340" y="806" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#444441">FailedUsers length > 0?</text>
</g>

<!-- True branch -->
<line x1="260" y1="828" x2="260" y2="862" stroke="#A32D2D" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="244" y="848" text-anchor="end" dominant-baseline="central" font-size="12" fill="#A32D2D">Yes</text>

<g>
  <rect x="160" y="862" width="200" height="44" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
  <text x="260" y="884" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#791F1F">Send failure email</text>
</g>

<!-- False branch -->
<line x1="420" y1="828" x2="420" y2="862" stroke="#3B6D11" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="436" y="848" dominant-baseline="central" font-size="12" fill="#3B6D11">No</text>

<g>
  <rect x="370" y="862" width="100" height="44" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text x="420" y="884" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#27500A">Done</text>
</g>

</svg>
